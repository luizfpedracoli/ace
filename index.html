<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroConsciente</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

:root{
--verde:#2e7d32;
--amarelo:#ffc107;
--bg:#ffffff;
--text:#222;
}

body.dark{
--bg:#121212;
--text:#fff;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* PROGRESS */
#progress{
position:fixed;
top:0;
left:0;
height:4px;
width:0%;
background:var(--amarelo);
z-index:9999;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
color:white;
z-index:1000;
}

.menu{
display:flex;
gap:20px;
list-style:none;
}

.menu a{
color:white;
text-decoration:none;
}

#theme-toggle{
background:var(--amarelo);
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* HERO */
header{
height:100vh;
background:url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1800&q=80');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:3rem;
}

/* SECTIONS */
section{
padding:80px 10%;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.stat{
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:10px;
text-align:center;
}

/* CALCULADORA */
#calculadora input{
padding:15px;
width:100%;
margin:10px 0;
}

button{
padding:12px 20px;
background:var(--verde);
color:white;
border:none;
cursor:pointer;
border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
}

/* RESPONSIVO */
@media(max-width:768px){
.menu{
display:none;
}
}

</style>
</head>

<body>

<div id="progress"></div>

<nav>
<div><b>AGROCONSCIENTE</b></div>

<ul class="menu">
<li><a href="#inicio">Início</a></li>
<li><a href="#impactos">Impactos</a></li>
<li><a href="#calculadora">Calculadora</a></li>
</ul>

<button id="theme-toggle">🌙</button>
</nav>

<header id="inicio">
<div class="hero">
<h1>Desperdício de Alimentos no Agronegócio</h1>
<p>Entenda o impacto global e como reduzir perdas.</p>
</div>
</header>

<section id="impactos">

<h2>Impactos</h2>

<div class="stats">
<div class="stat">
<h3 class="counter" data-target="1300">0</h3>
<p>Milhões de toneladas</p>
</div>

<div class="stat">
<h3 class="counter" data-target="30">0</h3>
<p>% produção perdida</p>
</div>

<div class="stat">
<h3 class="counter" data-target="8">0</h3>
<p>% emissões globais</p>
</div>
</div>

</section>

<section id="calculadora">

<h2>Calculadora de Impacto</h2>

<input type="number" id="kg" placeholder="Kg desperdiçados por mês">

<button onclick="calcular()">Calcular</button>

<h3 id="resultado"></h3>

</section>

<a class="whatsapp" href="https://wa.me/5541999999999">💬</a>

<script>

/* PROGRESS */
window.addEventListener("scroll",()=>{
let win = document.documentElement.scrollTop;
let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
document.getElementById("progress").style.width = (win/height)*100 + "%";
});

/* DARK MODE */
const toggle = document.getElementById("theme-toggle");

toggle.onclick = ()=>{
document.body.classList.toggle("dark");
localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");
};

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

/* COUNTER */
const counters = document.querySelectorAll(".counter");

counters.forEach(c=>{
let update=()=>{
let target=+c.getAttribute("data-target");
let current=+c.innerText;
let inc=target/100;
if(current<target){
c.innerText=Math.ceil(current+inc);
setTimeout(update,20);
}else c.innerText=target;
};
update();
});

/* CALCULADORA */
function calcular(){
let kg=document.getElementById("kg").value;

if(!kg){
document.getElementById("resultado").innerText="Digite um valor válido";
return;
}

let anual=kg*12;
document.getElementById("resultado").innerText=
`Você desperdiça ${anual} kg por ano.`;
}

</script>

</body>
</html>
